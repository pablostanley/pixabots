name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint app
        run: pnpm --filter pixabots-app lint

      - name: Build + test @pixabots/core
        run: pnpm --filter @pixabots/core test

      - name: Check combo-count drift in static files
        run: node scripts/check-combo-count.mjs

      - name: Build app
        run: pnpm --filter pixabots-app build
