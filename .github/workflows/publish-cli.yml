name: Publish pixabots CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core (cli depends on it)
        run: pnpm --filter @pixabots/core build

      - name: Build CLI
        run: pnpm --filter "./packages/cli" build

      - name: Publish
        run: pnpm --filter "./packages/cli" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
